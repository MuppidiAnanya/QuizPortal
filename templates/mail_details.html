<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transactions for this Month</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
</head>
<body>
    <div class="container">
        <div class="row">
            <h1 class="text-center mt-2">Quiz Details</h1>
            <p class="fs-3">Hello {{data['username']}}</p>
            <p class="fs-5">Please refer to the Quiz attempt details </p>
        </div>
        <div class="row">
            <table class="table table-striped mx-2">
                <thead>
                    <tr>
                        <th scope="col">quiz_id</th>
                        <th scope="col">quiz_name</th>
                        <th scope="col">score</th>
                        <th scope="col">attempt_date</th>
                    </tr>
                </thead>
                <tbody>
                    {% for t in data['attempts'] %}
                    <tr>
                        <th scope="row">{{loop.index}}</th>
                        <td>{{t['quiz_id']}}</td>
                        <td>{{t['quiz_name']}}</td>
                        <td>{{t['score']}}</td>
                        <td>{{t['attempt_date']}}</td>
                    
                    </tr>
                    {% endfor %}
                </tbody>  
            </table>

        </div>
       
    </div>
    
</body>
</html>
